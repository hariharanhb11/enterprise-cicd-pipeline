apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
        - name: myapp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          ports:
            - containerPort: {{ .Values.containerPort }}

          env:
            - name: APP_VERSION
              value: "{{ .Values.env.APP_VERSION }}"

            - name: DEPLOY_TIME
              value: "{{ .Values.env.DEPLOY_TIME }}"

            - name: ENVIRONMENT
              value: "{{ .Values.env.ENVIRONMENT }}"

          readinessProbe:
            httpGet:
              path: /health
              port: 5000

          livenessProbe:
            httpGet:
              path: /health
              port: 5000